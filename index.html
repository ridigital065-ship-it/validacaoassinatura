<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Validação de Documento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.logo {
  font-size: 28px;
  font-weight: bold;
  color: #0f7f79;
}

/* BANNER */
.banner {
  background: #041c3b;
  color: white;
  padding: 80px 20px;
  text-align: center;
}

.banner h1 {
  font-size: 32px;
}

.banner p {
  margin-top: 10px;
  font-size: 18px;
}

/* DOCUMENTO */
.documento {
  padding: 30px;
}

.pagina {
  margin: 30px auto;
  width: 90%;
  max-width: 800px;
  background: white;
  padding: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  border-radius: 8px;
}

img {
  width: 100%;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="logo">Validação</div>
  <div>Documento eletrônico</div>
</div>

<!-- BANNER -->
<div class="banner">
  <h1>Documento Validado</h1>
  <p>Visualização oficial do documento eletrônico</p>
</div>

<!-- DOCUMENTO -->
<div class="documento">

  <div class="pagina">
    <img src="documento1.jpg">
  </div>

  <div class="pagina">
    <img src="documento2.jpg">
  </div>

  <div class="pagina">
    <img src="documento3.jpg">
  </div>

  <div class="pagina">
    <img src="documento4.jpg">
  </div>

</div>

</body>
</html>
